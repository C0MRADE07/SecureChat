<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="SecureChat — End-to-end encrypted messaging. Private rooms, zero server storage.">
  <title>SecureChat — Encrypted Messaging</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Static Bioluminescent Splash Screen -->
    <div class="splash-overlay" id="splash-screen">
      <div class="splash-logo">🔐</div>
      <h1 class="splash-title">Secure<span>Chat</span></h1>
      <div class="splash-subtitle">END-TO-END ENCRYPTED MESSAGING</div>
      <div class="splash-status-box">
        <div class="splash-progress-track">
          <div class="splash-progress-bar" id="splash-progress"></div>
        </div>
        <div class="splash-status-text" id="splash-status">Connecting to secure network...</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/crypto.js"></script>
  <script src="js/components.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
